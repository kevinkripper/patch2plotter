<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patch2Plotter</title>
  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.2/dist/svg.min.js"></script>
  <style>
    :root{--panel:#f7f7f7;--line:#d4d4d4;--muted:#666;--control:#fff;--blue:#0a84ff}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111;display:grid;grid-template-columns:340px 1fr;min-height:100vh}
    aside{padding:9px;background:#f4f4f4;border-right:1px solid #ccc;overflow:auto;max-height:100vh}
    h1{font-size:18px;margin:0 0 5px;line-height:1.1}.title-line{display:flex;align-items:baseline;gap:7px}.title-credit{font-size:11px;font-weight:400;color:#666}.title-credit a{color:#666;text-decoration:underline;text-underline-offset:2px}
    .panel{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 9px;margin:0 0 7px;box-shadow:0 1px 0 rgba(0,0,0,.03)}
    .section-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#444;margin:0 0 6px;padding-bottom:4px;border-bottom:1px solid #e5e5e5;cursor:pointer;list-style:none}.section-title::-webkit-details-marker{display:none}details>.section-title:before{content:'▸';display:inline-block;width:14px;color:#777}details[open]>.section-title:before{content:'▾'}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.tight-row{align-items:end}.text-top-row{grid-template-columns:1fr 1.35fr;align-items:start}.inline-check{align-self:end;min-height:28px}.zoom-field{margin-top:8px;padding-top:0}.tagline{margin:0 0 18px}.load-panel{margin-top:18px}.preview-zoom-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;margin-top:7px;padding-top:0}.preview-zoom-row span{font-size:12px;white-space:nowrap;color:#222}.load-panel input[type="file"]{display:none}.file-display{display:flex;align-items:center;justify-content:center;width:100%;height:29px;padding:5px 7px;border-radius:7px;border:1px solid #aaa;background:#fff;color:#111;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;cursor:default}.curvature-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;margin-top:5px}.curvature-row .check{margin:0}.curvature-row input[type="range"]{margin-top:1px}.hatch-top-row{display:grid;grid-template-columns:auto auto 1fr;gap:8px;align-items:end;margin:2px 0 6px}.hatch-top-row .check{margin:0 0 6px}.hatch-top-row .field{margin-bottom:0}.bg-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;align-items:end;margin:2px 0 6px}.bg-amount-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center}.bg-amount-row span{font-size:12px;white-space:nowrap;color:#222}
    .field{display:flex;flex-direction:column;gap:3px;margin:0 0 6px;font-size:12px;color:#222;min-width:0}.field span{line-height:1.15}
    .check{display:flex;align-items:center;gap:7px;margin:5px 0;font-size:12px;line-height:1.2;color:#111}.check input{width:15px;height:15px;margin:0;flex:0 0 auto}
    input,button,select{font:inherit;padding:5px 7px;border-radius:7px;border:1px solid #aaa;background:var(--control);color:#111;max-width:100%;min-width:0}button{cursor:pointer;background:#e9e9e9;font-size:12px;padding:5px 8px;min-height:28px}button:hover{background:#ddd}
    input[type="range"]{padding:0;height:22px;width:100%}input[type="color"]{width:100%;height:28px;padding:2px}input[type="number"]{width:100%}
    .compact{margin-bottom:0}.hint{font-size:12px;color:#555;line-height:1.35;margin:0}.mini{font-size:12px;color:var(--muted)}
    a{color:#111;text-decoration:underline;text-underline-offset:2px}
    input:disabled{opacity:.35;cursor:not-allowed}
    .title-divider{height:1px;background:#d9d9d9;margin:10px 0 12px}.slim-panel{padding:6px 9px}.hidden-zoom{display:none}.credit-panel{background:#fafafa}#svg{padding:18px;overflow:auto;background:#fff;touch-action:none}.hr{height:1px;background:#e2e2e2;margin:12px 0}
  </style>
</head>
<body>
  <aside>
    <div class="title-line"><h1>Patch2Plotter</h1><span class="title-credit">by <a href="https://kevinkripper.com" target="_blank" rel="noopener">Kevin Kripper</a></span></div>
    <p class="hint tagline">Convert Max patches into layered, plotter-friendly SVGs.</p>
    <div class="title-divider"></div>

    <section class="panel load-panel">
      <input id="fileInput" type="file" accept=".maxpat,.json" />
      <div id="fileName" class="file-display">No file chosen</div>
      <div class="row3" style="margin-top:8px">
        <button id="read" type="button">↑ Read</button>
        <button id="reset" type="button">Reset</button>
        <button id="export" type="button">↓ SVG</button>
      </div>
      <div class="preview-zoom-row"><span>Preview zoom</span><input id="previewZoom" type="range" min="25" max="300" step="5" value="100" /></div>
      <button id="zoomOut" class="hidden-zoom" type="button">Zoom −</button>
      <button id="zoomIn" class="hidden-zoom" type="button">Zoom +</button>
    </section>

    <details class="panel" open>
      <summary class="section-title">Object Outlines</summary>
      <div class="row tight-row">
        <label class="field"><span>Color</span><input id="moduleColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="moduleWidth" type="number" min="0" step="0.05" value="0.25" /></label>
      </div>
    </details>

    <details class="panel" open>
      <summary class="section-title">Text</summary>
      <div class="row text-top-row">
        <div>
          <label class="check"><input id="showText" type="checkbox" checked /> Show</label>
          <label class="check"><input id="wrapText" type="checkbox" /> Wrap</label>
          <label class="check"><input id="forceCaps" type="checkbox" /> Caps</label>
        </div>
        <label class="field"><span>Hershey font</span>
          <select id="hersheyFont">
            <option value="sans1">Hershey Sans 1-stroke</option>
            <option value="sansMedium">Hershey Sans medium</option>
            <option value="serifMedium">Hershey Serif medium</option>
            <option value="serifMediumItalic">Hershey Serif medium italic</option>
            <option value="serifBold">Hershey Serif bold</option>
            <option value="serifBoldItalic">Hershey Serif bold italic</option>
            <option value="script1">Hershey Script 1-stroke</option>
            <option value="scriptMedium">Hershey Script medium</option>
            <option value="gothicEnglish">Hershey Gothic English</option>
            <option value="emsAllure">EMS Allure</option>
            <option value="emsElfin">EMS Elfin</option>
            <option value="emsFelix">EMS Felix</option>
            <option value="emsNixish">EMS Nixish</option>
            <option value="emsNixishItalic">EMS Nixish Italic</option>
            <option value="emsOsmotron">EMS Osmotron</option>
            <option value="emsReadability">EMS Readability</option>
            <option value="emsReadabilityItalic">EMS Readability Italic</option>
            <option value="emsTech" selected>EMS Tech</option>
          </select>
        </label>
      </div>
      <div class="row3 tight-row">
        <label class="field"><span>Size</span><input id="textSize" type="number" min="4" step="1" value="9" /></label>
        <label class="field"><span>Width (mm)</span><input id="textWidth" type="number" min="0.05" step="0.05" value="0.25" /></label>
        <label class="field"><span>Color</span><input id="textColor" type="color" value="#000000" /></label>
      </div>
    </details>

    <details class="panel" open>
      <summary class="section-title">Patchcoords</summary>
      <div class="row tight-row">
        <label class="field"><span>Color</span><input id="cableColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="cableWidth" type="number" min="0.05" step="0.05" value="0.5" /></label>
      </div>
      <div class="curvature-row">
        <label class="check"><input id="curvy" type="checkbox" checked /> Curve</label>
        <input id="curvature" type="range" min="0" max="50" step="1" value="35" />
      </div>
      <label class="check"><input id="autoDashPatchcoords" type="checkbox" /> Dashes</label>
    </details>

    <details class="panel">
      <summary class="section-title">Background Pattern</summary>
      <div class="bg-row">
        <label class="field compact"><span>Pattern</span>
          <select id="bgMode">
            <option value="none" selected>None</option>
            <option value="dots">Dots</option>
            <option value="grid">Grid</option>
          </select>
        </label>
        <label class="field compact"><span>Color</span><input id="bgColor" type="color" value="#b8b8b8" /></label>
      </div>
      <div class="bg-amount-row">
        <span>Amount</span>
        <input id="bgAmount" type="range" min="12" max="80" step="1" value="80" />
      </div>
    </details>

    <details class="panel">
      <summary class="section-title">Empty Object Hatching</summary>
      <div class="hatch-top-row">
        <label class="check"><input id="emptyObjectHatch" type="checkbox" /> Enable</label>
        <label class="check"><input id="hatchCross" type="checkbox" /> Crosshatch</label>
        <label class="field"><span>Angle</span><input id="hatchAngle" type="number" min="0" max="180" step="1" value="45" /></label>
      </div>
      <div class="row3 tight-row">
        <label class="field"><span>Color</span><input id="hatchColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="hatchWidth" type="number" min="0.05" step="0.05" value="0.25" /></label>
        <label class="field"><span>Spacing</span><input id="hatchSpacing" type="number" min="1" step="1" value="4" /></label>
      </div>
    </details>

    <details class="panel">
      <summary class="section-title">Object Label Hatching</summary>
      <div class="hatch-top-row">
        <label class="check"><input id="bandHatch" type="checkbox" /> Enable</label>
        <label class="check"><input id="bandHatchCross" type="checkbox" /> Crosshatch</label>
        <label class="field"><span>Angle</span><input id="bandHatchAngle" type="number" min="0" max="180" step="1" value="45" /></label>
      </div>
      <div class="row3 tight-row">
        <label class="field"><span>Color</span><input id="bandHatchColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="bandHatchWidth" type="number" min="0.05" step="0.05" value="0.25" /></label>
        <label class="field"><span>Spacing</span><input id="bandHatchSpacing" type="number" min="1" step="1" value="4" /></label>
      </div>
    </details>
  </aside>
  <main id="svg"></main>
<script>
function lerp(a,b,t){return a+t*(b-a)}
function strokeWidthMM(v){ return `${Number(v) || 0}mm`; }
let draw=null, patch=null;

// Compact monoline vector alphabet. Coordinates are in a 0..6 x 0..8 box.
// This behaves like a Hershey/stroke font for plotting: strokes only, no filled outlines.
const HERSHEY = {
  'A':[[[0,8],[3,0],[6,8]],[[1,5],[5,5]]], 'B':[[[0,0],[0,8]],[[0,0],[4,0],[6,2],[4,4],[0,4]],[[0,4],[4,4],[6,6],[4,8],[0,8]]],
  'C':[[[6,1],[5,0],[1,0],[0,1],[0,7],[1,8],[5,8],[6,7]]], 'D':[[[0,0],[0,8]],[[0,0],[4,0],[6,2],[6,6],[4,8],[0,8]]],
  'E':[[[6,0],[0,0],[0,8],[6,8]],[[0,4],[4,4]]], 'F':[[[0,8],[0,0],[6,0]],[[0,4],[4,4]]],
  'G':[[[6,1],[5,0],[1,0],[0,1],[0,7],[1,8],[5,8],[6,7],[6,5],[3,5]]], 'H':[[[0,0],[0,8]],[[6,0],[6,8]],[[0,4],[6,4]]],
  'I':[[[0,0],[6,0]],[[3,0],[3,8]],[[0,8],[6,8]]], 'J':[[[6,0],[6,7],[5,8],[1,8],[0,7]]],
  'K':[[[0,0],[0,8]],[[6,0],[0,4],[6,8]]], 'L':[[[0,0],[0,8],[6,8]]],
  'M':[[[0,8],[0,0],[3,4],[6,0],[6,8]]], 'N':[[[0,8],[0,0],[6,8],[6,0]]],
  'O':[[[1,0],[5,0],[6,1],[6,7],[5,8],[1,8],[0,7],[0,1],[1,0]]], 'P':[[[0,8],[0,0],[4,0],[6,2],[4,4],[0,4]]],
  'Q':[[[1,0],[5,0],[6,1],[6,7],[5,8],[1,8],[0,7],[0,1],[1,0]],[[4,6],[6,8]]], 'R':[[[0,8],[0,0],[4,0],[6,2],[4,4],[0,4]],[[3,4],[6,8]]],
  'S':[[[6,1],[5,0],[1,0],[0,1],[0,3],[1,4],[5,4],[6,5],[6,7],[5,8],[1,8],[0,7]]], 'T':[[[0,0],[6,0]],[[3,0],[3,8]]],
  'U':[[[0,0],[0,7],[1,8],[5,8],[6,7],[6,0]]], 'V':[[[0,0],[3,8],[6,0]]],
  'W':[[[0,0],[1,8],[3,4],[5,8],[6,0]]], 'X':[[[0,0],[6,8]],[[6,0],[0,8]]],
  'Y':[[[0,0],[3,4],[6,0]],[[3,4],[3,8]]], 'Z':[[[0,0],[6,0],[0,8],[6,8]]],
  '0':[[[1,0],[5,0],[6,1],[6,7],[5,8],[1,8],[0,7],[0,1],[1,0]],[[1,7],[5,1]]], '1':[[[2,2],[3,0],[3,8]],[[1,8],[5,8]]],
  '2':[[[0,2],[0,1],[1,0],[5,0],[6,1],[6,3],[0,8],[6,8]]], '3':[[[0,1],[1,0],[5,0],[6,1],[6,3],[4,4],[6,5],[6,7],[5,8],[1,8],[0,7]]],
  '4':[[[5,8],[5,0]],[[0,5],[6,5]],[[0,5],[5,0]]], '5':[[[6,0],[1,0],[0,4],[5,4],[6,5],[6,7],[5,8],[1,8],[0,7]]],
  '6':[[[6,1],[5,0],[1,0],[0,1],[0,7],[1,8],[5,8],[6,7],[6,5],[5,4],[0,4]]], '7':[[[0,0],[6,0],[2,8]]],
  '8':[[[1,0],[5,0],[6,1],[6,3],[5,4],[1,4],[0,3],[0,1],[1,0]],[[1,4],[5,4],[6,5],[6,7],[5,8],[1,8],[0,7],[0,5],[1,4]]],
  '9':[[[6,4],[1,4],[0,3],[0,1],[1,0],[5,0],[6,1],[6,7],[5,8],[1,8],[0,7]]],
  '.':[[[3,8],[3.1,8]]], ',':[[[3,7],[2,9]]], ':':[[[3,2],[3.1,2]],[[3,6],[3.1,6]]], ';':[[[3,2],[3.1,2]],[[3,6],[2,9]]],
  '-':[[[1,4],[5,4]]], '_':[[[0,8],[6,8]]], '+':[[[1,4],[5,4]],[[3,2],[3,6]]], '*':[[[0,4],[6,4]],[[1,1],[5,7]],[[5,1],[1,7]]],
  '/':[[[0,8],[6,0]]], '\\':[[[0,0],[6,8]]], '=':[[[0,3],[6,3]],[[0,5],[6,5]]], '<':[[[6,1],[0,4],[6,7]]], '>':[[[0,1],[6,4],[0,7]]],
  '(':[[[4,0],[2,2],[2,6],[4,8]]], ')':[[[2,0],[4,2],[4,6],[2,8]]], '[':[[[5,0],[2,0],[2,8],[5,8]]], ']':[[[1,0],[4,0],[4,8],[1,8]]],
  '{':[[[5,0],[3,1],[3,3],[1,4],[3,5],[3,7],[5,8]]], '}':[[[1,0],[3,1],[3,3],[5,4],[3,5],[3,7],[1,8]]],
  '!':[[[3,0],[3,6]],[[3,8],[3.1,8]]], '?':[[[0,2],[0,1],[1,0],[5,0],[6,1],[6,3],[3,5],[3,6]],[[3,8],[3.1,8]]],
  '"':[[[2,0],[2,2]],[[4,0],[4,2]]], "'": [[[3,0],[3,2]]], '`':[[[2,0],[4,2]]], '~':[[[0,5],[2,3],[4,5],[6,3]]],
  '#':[[[1,0],[1,8]],[[5,0],[5,8]],[[0,3],[6,3]],[[0,6],[6,6]]], '%':[[[0,8],[6,0]],[[1,0],[2,1],[1,2],[0,1],[1,0]],[[5,6],[6,7],[5,8],[4,7],[5,6]]],
  '&':[[[6,8],[1,3],[1,1],[2,0],[4,0],[5,1],[5,3],[0,8],[6,8]]], '@':[[[6,6],[5,8],[1,8],[0,7],[0,1],[1,0],[5,0],[6,1],[6,4],[4,5],[2,4],[2,2],[4,2],[4,5]]],
  ' ' : []
};

const HERSHEY_LOWER = {
  'a':[[[1,4],[5,4],[6,5],[6,8]],[[6,5],[5,4],[2,4],[1,5],[1,7],[2,8],[5,8],[6,7]]],
  'b':[[[1,1],[1,8]],[[1,5],[2,4],[5,4],[6,5],[6,7],[5,8],[2,8],[1,7]]],
  'c':[[[6,5],[5,4],[2,4],[1,5],[1,7],[2,8],[5,8],[6,7]]],
  'd':[[[6,1],[6,8]],[[6,5],[5,4],[2,4],[1,5],[1,7],[2,8],[5,8],[6,7]]],
  'e':[[[1,6],[6,6],[6,5],[5,4],[2,4],[1,5],[1,7],[2,8],[5,8],[6,7]]],
  'f':[[[5,1],[4,1],[3,2],[3,8]],[[1,4],[5,4]]],
  'g':[[[6,4],[6,9],[5,10],[2,10],[1,9]],[[6,5],[5,4],[2,4],[1,5],[1,7],[2,8],[5,8],[6,7]]],
  'h':[[[1,1],[1,8]],[[1,5],[2,4],[5,4],[6,5],[6,8]]],
  'i':[[[3,4],[3,8]],[[3,2],[3.1,2]]],
  'j':[[[4,4],[4,9],[3,10],[1,10]],[[4,2],[4.1,2]]],

  'l':[[[3,1],[3,8]]],
  'm':[[[0,8],[0,4],[2,4],[3,5],[3,8]],[[3,5],[4,4],[6,4],[6,8]]],
  'n':[[[1,8],[1,4],[2,4],[5,4],[6,5],[6,8]]],
  'o':[[[2,4],[5,4],[6,5],[6,7],[5,8],[2,8],[1,7],[1,5],[2,4]]],
  'p':[[[1,10],[1,4]],[[1,5],[2,4],[5,4],[6,5],[6,7],[5,8],[2,8],[1,7]]],
  'q':[[[6,10],[6,4]],[[6,5],[5,4],[2,4],[1,5],[1,7],[2,8],[5,8],[6,7]]],
  'r':[[[1,8],[1,4],[2,4],[5,4],[6,5]]],
  's':[[[6,5],[5,4],[2,4],[1,5],[2,6],[5,6],[6,7],[5,8],[2,8],[1,7]]],
  't':[[[3,2],[3,7],[4,8],[6,8]],[[1,4],[5,4]]],
  'u':[[[1,4],[1,7],[2,8],[5,8],[6,7],[6,4]]],
  'v':[[[1,4],[3.5,8],[6,4]]],
  'w':[[[0,4],[1.5,8],[3,5],[4.5,8],[6,4]]],
  'x':[[[1,4],[6,8]],[[6,4],[1,8]]],
  'y':[[[1,4],[3.5,8],[6,4]],[[3.5,8],[2,10]]],

function glyphFor(ch){ return HERSHEY[ch] || HERSHEY_LOWER[ch] || HERSHEY[ch.toUpperCase()] || [[[0,0],[6,0],[6,8],[0,8],[0,0]],[[0,0],[6,8]]]; }
function fontParams(name){
  // These are plotter-style approximations of common Hershey/EMS families,
  // using the embedded monoline alphabet plus scale/slant/duplicate variations.
  const table={
    sans1:{xScale:1, slant:0, spacing:1, duplicate:0, yWave:0},
    sansMedium:{xScale:1.04, slant:0, spacing:1.05, duplicate:0.26, yWave:0},
    serifMedium:{xScale:1.02, slant:0, spacing:1.08, duplicate:0.18, yWave:0, serif:true},
    serifMediumItalic:{xScale:1.02, slant:0.25, spacing:1.08, duplicate:0.18, yWave:0, serif:true},
    serifBold:{xScale:1.08, slant:0, spacing:1.12, duplicate:0.52, yWave:0, serif:true},
    serifBoldItalic:{xScale:1.08, slant:0.28, spacing:1.12, duplicate:0.52, yWave:0, serif:true},
    script1:{xScale:1.05, slant:0.34, spacing:1.02, duplicate:0, yWave:0.55},
    scriptMedium:{xScale:1.07, slant:0.35, spacing:1.04, duplicate:0.22, yWave:0.65},
    gothicEnglish:{xScale:1.12, slant:0, spacing:1.15, duplicate:0.38, yWave:0, angular:true},
    emsAllure:{xScale:1.12, slant:0.24, spacing:1.08, duplicate:0, yWave:0.9},
    emsElfin:{xScale:0.72, slant:0, spacing:0.78, duplicate:0, yWave:0},
    emsFelix:{xScale:1.18, slant:0, spacing:1.2, duplicate:0.28, yWave:0.2},
    emsNixish:{xScale:0.92, slant:0, spacing:0.96, duplicate:0.18, yWave:0},
    emsNixishItalic:{xScale:0.92, slant:0.25, spacing:0.96, duplicate:0.18, yWave:0},
    emsOsmotron:{xScale:1.22, slant:0, spacing:1.22, duplicate:0, yWave:0},
    emsReadability:{xScale:1, slant:0, spacing:1.04, duplicate:0.08, yWave:0},
    emsReadabilityItalic:{xScale:1, slant:0.22, spacing:1.04, duplicate:0.08, yWave:0},
    emsTech:{xScale:0.82, slant:0, spacing:0.88, duplicate:0, yWave:0},
    // backwards compatibility with previous menu values
    simplex:{xScale:1, slant:0, spacing:1, duplicate:0, yWave:0},
    duplex:{xScale:1, slant:0, spacing:1.05, duplicate:0.32, yWave:0},
    triplex:{xScale:1.08, slant:0, spacing:1.12, duplicate:0.5, yWave:0},
    script:{xScale:1.05, slant:0.33, spacing:1.02, duplicate:0, yWave:0.55},
    italic:{xScale:1, slant:0.28, spacing:1.04, duplicate:0, yWave:0},
    condensed:{xScale:0.68, slant:0, spacing:0.72, duplicate:0, yWave:0},
    expanded:{xScale:1.45, slant:0, spacing:1.45, duplicate:0, yWave:0}
  };
  return table[name] || table.sans1;

    let textOffset=(box.maxclass==='number'||box.maxclass==='flonum')?14:4;
    if(label && o.showText){
      const textY = r[1] + Math.max(4, (r[3] - estimateStrokeTextHeight(label,o.textSize)) / 2) + 2;
      drawStrokeText(textGroup,label,r[0]+textOffset,textY,o.textSize,o.textColor,o.textWidth,o.hersheyFont);
    }
    if(box.maxclass==='number' || box.maxclass==='flonum'){
      const cy=r[1]+r[3]/2;
      modules.path(`M${r[0]+4} ${cy-5} L${r[0]+10} ${cy} L${r[0]+4} ${cy+5}`).fill('none').stroke({width:strokeWidthMM(o.moduleWidth),color:o.moduleColor,linejoin:'round'});
    }
  });
  applyPreviewZoom();
  return draw;
}


function resetControls(){
  const set = (id, value) => {
    const el = document.querySelector('#' + id);
    if(!el) return;
    if(el.type === 'checkbox') el.checked = !!value;
    else el.value = value;
  };

  set('previewZoom', 100);

  set('moduleColor', '#000000');
  set('moduleWidth', 0.25);

  set('showText', true);
  set('wrapText', false);
  set('forceCaps', false);
  set('hersheyFont', 'emsTech');
  set('textSize', 9);
  set('textWidth', 0.25);
  set('textColor', '#000000');

  set('cableColor', '#000000');
  set('cableWidth', 0.5);
  set('curvy', true);
  set('curvature', 35);
  set('autoDashPatchcoords', false);

  set('bgMode', 'none');
  set('bgColor', '#b8b8b8');
  set('bgAmount', 80);

  set('emptyObjectHatch', false);
  set('hatchColor', '#000000');
  set('hatchWidth', 0.25);
  set('hatchSpacing', 4);
  set('hatchAngle', 45);
  set('hatchCross', false);

  set('bandHatch', false);
  set('bandHatchColor', '#000000');
  set('bandHatchWidth', 0.25);
  set('bandHatchSpacing', 4);
  set('bandHatchAngle', 45);
  set('bandHatchCross', false);

  setHatchControlsEnabled();
  if(patch) draw = drawSVG(patch);
  applyPreviewZoom();
}

function setHatchControlsEnabled(){
  const objectOn = document.querySelector('#emptyObjectHatch').checked;
  ['hatchColor','hatchWidth','hatchSpacing','hatchAngle','hatchCross'].forEach(id=>{
    const el=document.querySelector('#'+id); if(el) el.disabled=!objectOn;
  });
  const bandOn = document.querySelector('#bandHatch').checked;
  ['bandHatchColor','bandHatchWidth','bandHatchSpacing','bandHatchAngle','bandHatchCross'].forEach(id=>{
    const el=document.querySelector('#'+id); if(el) el.disabled=!bandOn;
  });
  const curvyOn = document.querySelector('#curvy').checked;
  const curvature = document.querySelector('#curvature');
  if(curvature) curvature.disabled = !curvyOn;
  const bgOn = document.querySelector('#bgMode').value !== 'none';
  ['bgColor','bgAmount'].forEach(id=>{
    const el=document.querySelector('#'+id); if(el) el.disabled=!bgOn;
  });
}

function redraw(){ setHatchControlsEnabled(); if(patch) draw=drawSVG(patch); }

document.querySelector('#reset').addEventListener('click', resetControls);

document.querySelector('#read').addEventListener('click',()=>{
  const input=document.querySelector('#fileInput');
  if(input) input.click();
});
document.querySelector('#fileInput').addEventListener('change',()=>{
  const file=document.querySelector('#fileInput').files[0]; if(!file)return;
  const nameEl=document.querySelector('#fileName');
  if(nameEl) nameEl.textContent=file.name;
  const reader=new FileReader();
  reader.onloadend=()=>{ const json=JSON.parse(reader.result); patch=json.patcher||json; draw=drawSVG(patch); };
  reader.readAsText(file);
});
['curvy','curvature','autoDashPatchcoords','bgMode','bgColor','bgAmount','showText','wrapText','forceCaps','hersheyFont','textSize','moduleColor','moduleWidth','emptyObjectHatch','hatchColor','hatchWidth','hatchSpacing','hatchAngle','hatchCross','bandHatch','bandHatchColor','bandHatchWidth','bandHatchSpacing','bandHatchAngle','bandHatchCross','cableColor','cableWidth','textColor','textWidth'].forEach(id=>{
  const el=document.querySelector('#'+id); el.addEventListener('change',redraw); el.addEventListener('input',redraw);
});
document.querySelector('#previewZoom').addEventListener('input',applyPreviewZoom);
document.querySelector('#zoomIn').addEventListener('click',()=>{const el=document.querySelector('#previewZoom'); el.value=Math.min(300,parseFloat(el.value)+10); applyPreviewZoom();});
document.querySelector('#zoomOut').addEventListener('click',()=>{const el=document.querySelector('#previewZoom'); el.value=Math.max(25,parseFloat(el.value)-10); applyPreviewZoom();});


let pinchStartDistance = null;
let pinchStartZoom = null;
const viewport = document.querySelector('#svg');
function touchDistance(touches){
  const a=touches[0], b=touches[1];
  return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
}
viewport.addEventListener('touchstart', (e)=>{
  if(e.touches.length===2){
    pinchStartDistance = touchDistance(e.touches);
    pinchStartZoom = parseFloat(document.querySelector('#previewZoom').value)||100;
    e.preventDefault();
  }
}, {passive:false});
viewport.addEventListener('touchmove', (e)=>{
  if(e.touches.length===2 && pinchStartDistance){
    const ratio = touchDistance(e.touches)/pinchStartDistance;
    const el=document.querySelector('#previewZoom');
    el.value = Math.max(25, Math.min(300, pinchStartZoom*ratio));
    applyPreviewZoom();
    e.preventDefault();
  }
}, {passive:false});
viewport.addEventListener('touchend', ()=>{
  pinchStartDistance = null;
  pinchStartZoom = null;
});
viewport.addEventListener('wheel', (e)=>{
  if(!e.ctrlKey && !e.metaKey) return;
  const el=document.querySelector('#previewZoom');
  const delta = e.deltaY < 0 ? 10 : -10;
  el.value = Math.max(25, Math.min(300, parseFloat(el.value)+delta));
  applyPreviewZoom();
  e.preventDefault();
}, {passive:false});

setHatchControlsEnabled();
document.querySelector('#export').addEventListener('click',()=>{
  if(!draw) return alert('Read a .maxpat first');
  const blob=new Blob([draw.svg()],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.download='patch2plotter.svg';
  a.href=URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
});
</script>
</body>
