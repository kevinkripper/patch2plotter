<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patch2Plotter</title>
  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.2/dist/svg.min.js"></script>
  <style>
    :root{--panel:#f7f7f7;--line:#d4d4d4;--muted:#666;--control:#fff;--blue:#0a84ff}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111;display:grid;grid-template-columns:340px minmax(0,1fr);height:100vh;overflow:hidden}
    aside{padding:9px;background:#f4f4f4;border-right:1px solid #ccc;overflow:auto;height:100vh}
    h1{font-size:18px;margin:0 0 5px;line-height:1.1}.title-line{display:flex;align-items:baseline;gap:7px}.title-credit{font-size:11px;font-weight:400;color:#666}.title-credit a{color:#666;text-decoration:underline;text-underline-offset:2px}
    .panel{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 9px;margin:0 0 7px;box-shadow:0 1px 0 rgba(0,0,0,.03)}
    .section-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#444;margin:0 0 6px;padding-bottom:4px;border-bottom:1px solid #e5e5e5;cursor:pointer;list-style:none;display:flex;align-items:center}.section-title::-webkit-details-marker{display:none}.section-label{flex:1}.section-enable{display:flex;align-items:center;gap:5px;margin-left:auto;font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;color:#555;cursor:pointer}.section-enable input{width:14px;height:14px;margin:0}details>.section-title:before{content:'▸';display:inline-block;width:14px;color:#777}details[open]>.section-title:before{content:'▾'}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.tight-row{align-items:end}.text-top-row{grid-template-columns:1fr 1.35fr;align-items:start}.tagline{margin:0 0 18px}.load-panel{margin-top:18px}.preview-zoom-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;margin-top:7px;padding-top:0}.preview-zoom-row span{font-size:12px;white-space:nowrap;color:#222}.load-panel input[type="file"]{display:none}.file-display{display:flex;align-items:center;justify-content:center;width:100%;height:29px;padding:5px 7px;border-radius:7px;border:1px solid #aaa;background:#fff;color:#111;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;cursor:default}.curvature-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;margin-top:5px}.curvature-row .check{margin:0}.curvature-row input[type="range"]{margin-top:1px}.hatch-top-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end;margin:2px 0 7px}.hatch-top-row .check{margin:0;min-height:45px;padding:0 8px;border:1px solid #d8d8d8;border-radius:7px;background:#fafafa}.hatch-top-row .field{margin-bottom:0}.text-toggle-group{display:grid;grid-template-columns:1fr;gap:6px}.text-toggle-group .check{margin:0;min-height:32px;padding:0 8px;border:1px solid #d8d8d8;border-radius:7px;background:#fafafa}.technical-fields{display:grid;grid-template-columns:1fr;gap:0}.technical-fields .field:last-child{margin-bottom:0}.bg-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;align-items:end;margin:2px 0 6px}.bg-amount-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center}.bg-amount-row span{font-size:12px;white-space:nowrap;color:#222}.spread-row{display:grid;grid-template-columns:18px minmax(0,1fr) 54px;gap:7px;align-items:center;margin:5px 0}.spread-row span{font-size:12px;color:#222}.spread-value-wrap{display:grid;grid-template-columns:1fr auto;align-items:center;border:1px solid #aaa;border-radius:7px;background:#fff;overflow:hidden;min-width:0}.spread-value-wrap input{width:100%;height:27px;border:0;border-radius:0;padding:4px 2px 4px 6px;text-align:right;font-size:10px;font-variant-numeric:tabular-nums;background:transparent}.spread-value-wrap input:focus{outline:2px solid var(--blue);outline-offset:-2px}.spread-value-wrap span{padding:0 5px 0 1px;color:#555;font-size:10px;pointer-events:none}
    .field{display:flex;flex-direction:column;gap:3px;margin:0 0 6px;font-size:12px;color:#222;min-width:0}.field span{line-height:1.15}
    .check{display:flex;align-items:center;gap:7px;margin:5px 0;font-size:12px;line-height:1.2;color:#111}.check input{width:15px;height:15px;margin:0;flex:0 0 auto}
    input,button,select{font:inherit;padding:5px 7px;border-radius:7px;border:1px solid #aaa;background:var(--control);color:#111;max-width:100%;min-width:0}button{cursor:pointer;background:#e9e9e9;font-size:12px;padding:5px 8px;min-height:28px}button:hover{background:#ddd}
    input[type="range"]{padding:0;height:22px;width:100%}input[type="color"]{width:100%;height:28px;padding:2px}input[type="number"]{width:100%}
    .compact{margin-bottom:0}.hint{font-size:12px;color:#555;line-height:1.35;margin:0}
    a{color:#111;text-decoration:underline;text-underline-offset:2px}
    input:disabled{opacity:.35;cursor:not-allowed}
    .title-divider{height:1px;background:#d9d9d9;margin:10px 0 12px}#svg{position:relative;padding:0;overflow:auto;background:#fff;touch-action:none;min-width:0;width:100%;height:100vh;overscroll-behavior:contain}
  </style>
</head>
<body>
  <aside>
    <div class="title-line"><h1>Patch2Plotter</h1><span class="title-credit">by <a href="https://kevinkripper.com" target="_blank" rel="noopener">Kevin Kripper</a></span></div>
    <p class="hint tagline">Convert Max patches into layered, plotter-friendly SVGs.</p>
    <div class="title-divider"></div>

    <section class="panel load-panel">
      <input id="fileInput" type="file" accept=".maxpat,.maxhelp,.json" />
      <div id="fileName" class="file-display">No file chosen</div>
      <div class="row3" style="margin-top:8px">
        <button id="read" type="button">↑ Read</button>
        <button id="reset" type="button">Reset</button>
        <button id="export" type="button">↓ SVG</button>
      </div>
      <div class="preview-zoom-row"><span>Preview zoom</span><input id="previewZoom" type="range" min="25" max="300" step="5" value="100" /></div>
    </section>


    <details class="panel">
      <summary class="section-title"><span class="section-label">Spread</span></summary>
      <div class="spread-row">
        <span>X</span>
        <input id="spreadX" type="range" min="-50" max="50" step="1" value="0" />
        <label class="spread-value-wrap" aria-label="Spread X percentage"><input id="spreadXValue" type="number" min="-50" max="50" step="1" value="0" /><span>%</span></label>
      </div>
      <div class="spread-row">
        <span>Y</span>
        <input id="spreadY" type="range" min="-50" max="50" step="1" value="0" />
        <label class="spread-value-wrap" aria-label="Spread Y percentage"><input id="spreadYValue" type="number" min="-50" max="50" step="1" value="0" /><span>%</span></label>
      </div>
    </details>

    <details class="panel">
      <summary class="section-title"><span class="section-label">Patchcoords</span><label class="section-enable"><input id="showPatchcoords" type="checkbox" checked /> Enable</label></summary>
      <div class="row tight-row">
        <label class="field"><span>Color</span><input id="cableColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="cableWidth" type="number" min="0.05" step="0.05" value="0.5" /></label>
      </div>
      <div class="curvature-row">
        <label class="check"><input id="curvy" type="checkbox" checked /> Curve</label>
        <input id="curvature" type="range" min="0" max="25" step="1" value="12" />
      </div>
      <label class="check"><input id="autoDashPatchcoords" type="checkbox" checked /> Dashes</label>
    </details>

    <details class="panel">
      <summary class="section-title"><span class="section-label">Text</span><label class="section-enable"><input id="showText" type="checkbox" checked /> Enable</label></summary>
      <div class="row text-top-row">
        <div class="text-toggle-group">
          <label class="check"><input id="wrapText" type="checkbox" /> Wrap</label>
          <label class="check"><input id="forceCaps" type="checkbox" /> Caps</label>
        </div>
        <label class="field"><span>Hershey font</span>
          <select id="hersheyFont">
            <option value="sans1">Hershey Sans 1-stroke</option>
            <option value="sansMedium">Hershey Sans medium</option>
            <option value="serifMedium">Hershey Serif medium</option>
            <option value="serifMediumItalic">Hershey Serif medium italic</option>
            <option value="serifBold">Hershey Serif bold</option>
            <option value="serifBoldItalic">Hershey Serif bold italic</option>
            <option value="script1">Hershey Script 1-stroke</option>
            <option value="scriptMedium">Hershey Script medium</option>
            <option value="gothicEnglish">Hershey Gothic English</option>
            <option value="emsAllure">EMS Allure</option>
            <option value="emsElfin">EMS Elfin</option>
            <option value="emsFelix">EMS Felix</option>
            <option value="emsNixish">EMS Nixish</option>
            <option value="emsNixishItalic">EMS Nixish Italic</option>
            <option value="emsOsmotron">EMS Osmotron</option>
            <option value="emsReadability">EMS Readability</option>
            <option value="emsReadabilityItalic">EMS Readability Italic</option>
            <option value="emsTech" selected>EMS Tech</option>
          </select>
        </label>
      </div>
      <div class="row3 tight-row">
        <label class="field"><span>Size</span><input id="textSize" type="number" min="4" step="1" value="9" /></label>
        <label class="field"><span>Width (mm)</span><input id="textWidth" type="number" min="0.05" step="0.05" value="0.25" /></label>
        <label class="field"><span>Color</span><input id="textColor" type="color" value="#000000" /></label>
      </div>
    </details>

    <details class="panel">
      <summary class="section-title"><span class="section-label">Object Outlines</span><label class="section-enable"><input id="showObjectOutlines" type="checkbox" checked /> Enable</label></summary>
      <div class="row tight-row">
        <label class="field"><span>Color</span><input id="moduleColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="moduleWidth" type="number" min="0" step="0.05" value="0.25" /></label>
      </div>
    </details>

    <details class="panel">
      <summary class="section-title"><span class="section-label">Object Label Hatching</span><label class="section-enable"><input id="bandHatch" type="checkbox" /> Enable</label></summary>
      <div class="hatch-top-row">
        <label class="check"><input id="bandHatchCross" type="checkbox" /> Crosshatch</label>
        <label class="field"><span>Angle</span><input id="bandHatchAngle" type="number" min="0" max="180" step="1" value="45" /></label>
      </div>
      <div class="row3 tight-row">
        <label class="field"><span>Color</span><input id="bandHatchColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="bandHatchWidth" type="number" min="0.05" step="0.05" value="0.25" /></label>
        <label class="field"><span>Spacing</span><input id="bandHatchSpacing" type="number" min="1" step="1" value="4" /></label>
      </div>
    </details>

    <details class="panel">
      <summary class="section-title"><span class="section-label">Empty Object Hatching</span><label class="section-enable"><input id="emptyObjectHatch" type="checkbox" /> Enable</label></summary>
      <div class="hatch-top-row">
        <label class="check"><input id="hatchCross" type="checkbox" /> Crosshatch</label>
        <label class="field"><span>Angle</span><input id="hatchAngle" type="number" min="0" max="180" step="1" value="45" /></label>
      </div>
      <div class="row3 tight-row">
        <label class="field"><span>Color</span><input id="hatchColor" type="color" value="#000000" /></label>
        <label class="field"><span>Width (mm)</span><input id="hatchWidth" type="number" min="0.05" step="0.05" value="0.25" /></label>
        <label class="field"><span>Spacing</span><input id="hatchSpacing" type="number" min="1" step="1" value="4" /></label>
      </div>
    </details>

    <details class="panel">
      <summary class="section-title"><span class="section-label">Background Pattern</span><label class="section-enable"><input id="enableBackgroundPattern" type="checkbox" /> Enable</label></summary>
      <div class="bg-row">
        <label class="field compact"><span>Pattern</span>
          <select id="bgMode">
            <option value="dots" selected>Dots</option>
            <option value="grid">Grid</option>
            <option value="scratchy">Scratchy</option>
          </select>
        </label>
        <label class="field compact"><span>Color</span><input id="bgColor" type="color" value="#b8b8b8" /></label>
      </div>
      <div class="bg-amount-row">
        <span>Amount</span>
        <input id="bgAmount" type="range" min="12" max="80" step="1" value="80" />
      </div>
    </details>

    <details class="panel">
      <summary class="section-title"><span class="section-label">Technical Label</span><label class="section-enable"><input id="showTechnicalLabel" type="checkbox" checked /> Enable</label></summary>
      <div class="technical-fields">
        <label class="field"><span>Patch name</span><input id="technicalPatchName" type="text" value="patch" /></label>
        <label class="field"><span>Author</span><input id="technicalAuthor" type="text" value="Kevin Kripper" /></label>
        <label class="field"><span>Date</span><input id="technicalDate" type="date" /></label>
      </div>
    </details>

  </aside>
  <main id="svg"></main>
<script>
function lerp(a,b,t){return a+t*(b-a)}
function strokeWidthMM(v){ return `${Number(v) || 0}mm`; }
let draw=null, patch=null;
let currentPatchFileName = 'patch';
function fileDateValue(file){
  const date = new Date(file.lastModified);
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

let lastPreviewZoom = 1;

    if(label && o.showText){

      const lines=label.split('\n');

function clipLineToRect(cx, cy, dx, dy, r) {

    if (seg) group.line(seg[0][0], seg[0][1], seg[1][0], seg[1][1]).stroke({width:strokeWidthMM(o.hatchWidth), color:o.hatchColor, linecap:'butt'});

  if (o.bandHatch && hatching) {

    drawBandHatching(hatching, bottom, o);

  modules.rect(top[2], top[3]).move(top[0], top[1]).fill('none').stroke({width:strokeWidthMM(o.moduleWidth),color:o.moduleColor});

function rectsForBackgroundMask(patch, o, layoutRects=null){

    const box = Box.box;

function subtractIntervals(baseStart, baseEnd, cuts){
  let intervals = [[baseStart, baseEnd]];
  cuts.forEach(c => {
    const a = Math.max(baseStart, c[0]);
    const b = Math.min(baseEnd, c[1]);
    if(b <= a) return;
    const next = [];
    intervals.forEach(iv => {
      if(b <= iv[0] || a >= iv[1]) next.push(iv);
      else {
        if(a > iv[0]) next.push([iv[0], a]);
        if(b < iv[1]) next.push([b, iv[1]]);
      }
    });

  });

}
function lineRectTInterval(x0, y0, x1, y1, r){

  const dy = y1 - y0;
  const checks = [
    [-dx, x0 - r[0]],
    [ dx, r[0] + r[2] - x0],
    [-dy, y0 - r[1]],
    [ dy, r[1] + r[3] - y0]
  ];
  for(const c of checks){
    const p = c[0], q = c[1];
    if(Math.abs(p) < 1e-9){
      if(q < 0) return null;
    } else {
      const t = q / p;
      if(p < 0){
        if(t > t1) return null;
        if(t > t0) t0 = t;
      } else {
        if(t < t0) return null;
        if(t < t1) t1 = t;
      }
    }

  };

function drawScratchyLine(group, x0, y0, x1, y1, color){
  const steps = 9;
  const seed = Math.floor((x0 * 13 + y0 * 17 + x1 * 19 + y1 * 23) * 1000);
  const rnd = seededRandom(seed);
  let d = '';
  for(let i=0; i<=steps; i++){
    const t = i / steps;
    const x = lerp(x0, x1, t) + (rnd() - 0.5) * 0.7;
    const y = lerp(y0, y1, t) + (rnd() - 0.5) * 0.7;
    d += `${i ? 'L' : 'M'}${x} ${y} `;

function drawScratchyBackground(group, o, bounds, rects){
  const density = Math.max(0, Math.min(1, ((o.bgAmount || 80) - 12) / 68));
  const color = o.bgColor || '#b8b8b8';
  const minX = bounds.minX;
  const minY = bounds.minY;
  const maxX = bounds.minX + bounds.width;
  const maxY = bounds.minY + bounds.height;
  const rnd = seededRandom(424242);

  const area = Math.max(1, (maxX - minX) * (maxY - minY));
  const count = Math.round(area * (0.0035 + density * 0.014));
  const baseAngles = [72, 104, 84, 116];

  function pointInAnyRect(x, y){
    return rects.some(r => x >= r[0] && x <= r[0] + r[2] && y >= r[1] && y <= r[1] + r[3]);
  }

  function clippedStroke(x0, y0, x1, y1){
    const cuts = rects
      .map(r => {
        const bleed = Math.min(5, Math.max(0, Math.min(r[2], r[3]) * 0.14)) * Math.pow(rnd(), 1.8);
        const rr = [
          r[0] + bleed,
          r[1] + bleed,
          Math.max(1, r[2] - bleed * 2),
          Math.max(1, r[3] - bleed * 2)
        ];
        return lineRectTInterval(x0, y0, x1, y1, rr);
      })
      .filter(Boolean);

    const parts = subtractIntervals(0, 1, cuts);
    if(!parts.length) return null;

    let best = null;
    let bestLen = 0;
    parts.forEach(iv => {
      const len = iv[1] - iv[0];
      if(len > bestLen){
        bestLen = len;
        best = iv;
      }
    });
    if(!best || bestLen < 0.08) return null;
    return best;
  }

  for(let i=0; i<count; i++){
    const x = minX + rnd() * (maxX - minX);
    const y = minY + rnd() * (maxY - minY);
    if(pointInAnyRect(x, y)) continue;

    const angle = (baseAngles[i % baseAngles.length] + (rnd() - 0.5) * 24) * Math.PI / 180;
    const len = 18 + rnd() * (26 + density * 38);
    const dx = Math.cos(angle) * len * 0.5;
    const dy = Math.sin(angle) * len * 0.5;

    const x0 = x - dx;
    const y0 = y - dy;
    const x1 = x + dx;
    const y1 = y + dy;

    const iv = clippedStroke(x0, y0, x1, y1);
    if(!iv) continue;

    const a = Math.max(0, iv[0]);
    const b = Math.min(1, iv[1]);
    if(b <= a) continue;

    drawScratchyLine(
      group,
      lerp(x0, x1, a),
      lerp(y0, y1, a),

function drawSvgBackground(group, o, bounds, rects){

  const color = o.bgColor || '#b8b8b8';
  const minX = bounds.minX;
  const minY = bounds.minY;
  const maxX = bounds.minX + bounds.width;
  const maxY = bounds.minY + bounds.height;

  const startX = Math.floor(minX / spacing) * spacing;
  const startY = Math.floor(minY / spacing) * spacing;

  if(o.bgMode === 'grid'){
    for(let x=startX; x<=maxX; x+=spacing){
      const cuts = rects
        .filter(r => x >= r[0] && x <= r[0]+r[2])
        .map(r => [r[1], r[1]+r[3]]);
      subtractIntervals(minY, maxY, cuts).forEach(iv => {
        group.line(x, iv[0], x, iv[1]).stroke({width:strokeWidthMM(0.12), color, linecap:'butt'});
      });
    }
    for(let y=startY; y<=maxY; y+=spacing){
      const cuts = rects
        .filter(r => y >= r[1] && y <= r[1]+r[3])
        .map(r => [r[0], r[0]+r[2]]);
      subtractIntervals(minX, maxX, cuts).forEach(iv => {
        group.line(iv[0], y, iv[1], y).stroke({width:strokeWidthMM(0.12), color, linecap:'butt'});

    }
  }

  if(o.bgMode === 'dots'){
    const dotR = Math.max(0.45, spacing * 0.025);
    for(let x=startX; x<=maxX; x+=spacing){

        group.circle(dotR * 2).center(x, y).fill(color).stroke('none');
      }
    }
  }

function objectTextForType(box){
  return String(box?.text || box?.maxclass || '').trim().toLowerCase();
}
function isAudioObject(box){
  const t = objectTextForType(box);
  return t.includes('~');
}
function isJitterObject(box){
  const t = objectTextForType(box);
  return t.startsWith('jit.') || t.includes(' jit.') || t.startsWith('jit_') || t.includes('jit.matrix') || t.includes('jit.gl');
}
function patchcoordKind(sourceBox){

  if (isJitterObject(sourceBox)) return 'jitter';
  if (isAudioObject(sourceBox)) return 'audio';
  return 'normal';
}

function cubicPoint(p0, p1, p2, p3, t){
  const mt = 1 - t;
  return {
    x: mt*mt*mt*p0.x + 3*mt*mt*t*p1.x + 3*mt*t*t*p2.x + t*t*t*p3.x,
    y: mt*mt*mt*p0.y + 3*mt*mt*t*p1.y + 3*mt*t*t*p2.y + t*t*t*p3.y

}
function samplePatchcoordPoints(sx, sy, dx, dy, curvy, curvature){
  if(!curvy || curvature <= 0) return [{x:sx,y:sy},{x:dx,y:dy}];
  const p0 = {x:sx, y:sy};
  const p1 = {x:sx, y:sy + curvature};
  const p2 = {x:dx, y:dy - curvature};
  const p3 = {x:dx, y:dy};
  const pts = [];
  const steps = 120;
  for(let i=0; i<=steps; i++){
    pts.push(cubicPoint(p0, p1, p2, p3, i/steps));
  }
  return pts;
}
function pointAlongPolyline(points, targetDistance){
  if(targetDistance <= 0) return points[0];
  let walked = 0;
  for(let i=1; i<points.length; i++){
    const a = points[i-1], b = points[i];
    const seg = Math.hypot(b.x-a.x, b.y-a.y);
    if(walked + seg >= targetDistance){
      const t = seg === 0 ? 0 : (targetDistance - walked) / seg;
      return {x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t)};
    }
    walked += seg;
  }
  return points[points.length-1];
}
function polylineLength(points){
  let len = 0;
  for(let i=1; i<points.length; i++){
    len += Math.hypot(points[i].x-points[i-1].x, points[i].y-points[i-1].y);
  }
  return len;
}
function drawSegmentedPatchcoord(group, sx, sy, dx, dy, o, kind, clipRect=null){
  const points = samplePatchcoordPoints(sx, sy, dx, dy, o.curvy, o.curvature);
  const total = polylineLength(points);
  const dash = kind === 'jitter' ? 3 : 7;
  const gap = 4;
  const stroke={width:strokeWidthMM(o.cableWidth),color:o.cableColor,linecap:'round',linejoin:'round'};
  let pos = 0;

  while(pos < total){
    const start = pointAlongPolyline(points, pos);
    const end = pointAlongPolyline(points, Math.min(total, pos + dash));
    drawClippedPolyline(group,[start,end],clipRect,stroke);
    pos += dash + gap;
  }
}

function drawSVG(patch){
  document.querySelector('#svg').innerHTML='';
  const o=opts();
  const layoutRects = computeLayoutRects(patch, o);
  const technicalLabel = technicalLabelMetrics(patch, o, layoutRects);
  const technicalClipRect = technicalLabel ? expandedClipRect(technicalLabel.rect) : null;
  const patchBounds = boundsIncludingRect(getPatchBounds(patch, o, layoutRects), technicalLabel?.rect);
  currentPatchBounds = patchBounds;
  const backgroundMaskRects = rectsForBackgroundMask(patch, o, layoutRects);
  if(technicalLabel) backgroundMaskRects.push(technicalLabel.rect.slice());

  const letterW = 816;
  const letterH = 1056;
  const draw=SVG().addTo('#svg').size('215.9mm','279.4mm').viewbox(0,0,letterW,letterH);
  draw.attr({xmlns:'http://www.w3.org/2000/svg', overflow:'visible'});
  draw.node.style.overflow = 'visible';
  const artwork = draw.group().id('patch2plotter');
  const backgroundLayer = o.enableBackgroundPattern ? artwork.group().id('background_pattern') : null;
  if(backgroundLayer) drawSvgBackground(backgroundLayer, o, patchBounds, backgroundMaskRects);
  const moduleHatching = o.emptyObjectHatch ? artwork.group().id('empty_object_hatching') : null;
  const newobjBarHatching = o.bandHatch ? artwork.group().id('object_label_hatching') : null;
  const modules=artwork.group().id('object_outlines');
  const patchcoords=artwork.group().id('patchcoords');
  const patchcoordGroups = {};
  function getPatchcoordGroup(kind){
    const id = kind === 'audio' ? 'msp' : (kind === 'jitter' ? 'jitter' : 'control');
    if(!patchcoordGroups[id]) patchcoordGroups[id] = patchcoords.group().id(id);
    return patchcoordGroups[id];
  }
  const textGroup=artwork.group().id('text');

  if(o.showPatchcoords) (patch.lines||[]).forEach(Line=>{
    const line=Line.patchline;
    const sourceWrap=(patch.boxes||[]).find(b=>b.box.id===line.source[0]);
    const destWrap=(patch.boxes||[]).find(b=>b.box.id===line.destination[0]);
    if(!sourceWrap||!destWrap) return;
    const s=sourceWrap.box, d=destWrap.box;
    const sr=layoutRectForBox(s, o, layoutRects);
    const dr=layoutRectForBox(d, o, layoutRects);
    const sx=outletX(s,line.source[1],sr), sy=sr[1]+sr[3];
    const dx=inletX(d,line.destination[1],dr), dy=dr[1];
    const c=o.curvature;
    const kind = patchcoordKind(s);
    const patchcoordGroup = getPatchcoordGroup(kind);
    if(o.autoDashPatchcoords && kind !== 'normal'){
      drawSegmentedPatchcoord(patchcoordGroup, sx, sy, dx, dy, o, kind, technicalClipRect);
    } else {
      const points=samplePatchcoordPoints(sx,sy,dx,dy,o.curvy,c);
      drawClippedPolyline(patchcoordGroup,points,technicalClipRect,{width:strokeWidthMM(o.cableWidth),color:o.cableColor,linecap:'round',linejoin:'round'});
    }
  });

  (patch.boxes||[]).forEach(Box=>{
    const box=Box.box, rawR=box.patching_rect||[0,0,80,20];
    const r=layoutRectForBox(box, o, layoutRects);
    const isComment=box.maxclass==='comment';
    const radius=(box.maxclass==='message'||box.maxclass==='function')?5:0;
    const label = labelForBox(box, rawR, o);
    const alwaysHatchClasses = ['panel', 'fpic', 'jit.pwindow', 'jit.pworld', 'lcd'];
    const hatchIfEmptyClasses = ['newobj', 'message', 'bpatcher'];
    const hatchableEmptyObject =
      alwaysHatchClasses.includes(box.maxclass) ||
      (hatchIfEmptyClasses.includes(box.maxclass) && !label);
    if(!isComment && moduleHatching && hatchableEmptyObject) {
      const hatchRect = emptyHatchingRectForBox(box, r);
      if(hatchRect[2] > 0 && hatchRect[3] > 0) drawHatching(moduleHatching, hatchRect, o);
    }
    if(o.showObjectOutlines && !isComment && o.moduleWidth>0){
      modules.rect(r[2],r[3]).radius(radius).move(r[0],r[1]).fill('none').stroke({width:strokeWidthMM(o.moduleWidth),color:o.moduleColor});
    }
    if(o.showObjectOutlines && box.maxclass==='newobj' && o.moduleWidth>0){
      drawNewObjBorderBands(modules, newobjBarHatching, r, o);
    }
    if(o.showObjectOutlines && box.maxclass==='button'){
      const w=o.moduleWidth;
      modules.circle(r[2]/1.5).center(r[0]+r[2]/2,r[1]+r[3]/2).fill('none').stroke({width:strokeWidthMM(w),color:o.moduleColor});
    }
    if(o.showObjectOutlines && box.maxclass==='toggle'){
      const border=r[2]*0.25, w=o.moduleWidth;
      modules.line(r[0]+border,r[1]+border,r[0]+r[2]-border,r[1]+r[3]-border).stroke({width:strokeWidthMM(w),color:o.moduleColor});
      modules.line(r[0]+r[2]-border,r[1]+border,r[0]+border,r[1]+r[3]-border).stroke({width:strokeWidthMM(w),color:o.moduleColor});
    }
    let textOffset=(box.maxclass==='number'||box.maxclass==='flonum'||box.maxclass==='number~')?14:4;
    if(label && o.showText){
      const capsYOffset = o.forceCaps ? 2 : 0;
      const multilineYOffset = !o.forceCaps && label.includes('\n') ? 3 : 0;
      const textY = r[1] + Math.max(4, (r[3] - estimateStrokeTextHeight(label,o.textSize)) / 2) + 2 + capsYOffset + multilineYOffset;
      drawStrokeText(textGroup,label,r[0]+textOffset,textY,o.textSize,o.textColor,o.textWidth,o.hersheyFont);
    }
    if(o.showObjectOutlines && (box.maxclass==='number' || box.maxclass==='flonum')){
      const cy=r[1]+r[3]/2;
      modules.path(`M${r[0]+4} ${cy-5} L${r[0]+10} ${cy} L${r[0]+4} ${cy+5}`).fill('none').stroke({width:strokeWidthMM(o.moduleWidth),color:o.moduleColor,linejoin:'round'});
    }
    if(o.showObjectOutlines && box.maxclass==='number~'){
      drawStrokeText(modules,'~',r[0]+4,r[1]+2,12,o.moduleColor,o.moduleWidth,o.hersheyFont);
    }
  });

  if(technicalLabel){
    const technicalGroup=artwork.group().id('technical_label');
    drawTechnicalLabel(technicalGroup,technicalLabel,o);
  }

  applyPreviewZoom();
  return draw;
}

function resetControls(){
  document.querySelectorAll('input, select').forEach(el => {
    if(el.id === 'fileInput') return;
    if(el.type === 'checkbox') el.checked = el.dataset.defaultChecked === '1';
    else el.value = el.dataset.defaultValue ?? el.defaultValue;
  });

  updateSpreadLabels();
  setHatchControlsEnabled();
  if(patch) redraw();
  else applyPreviewZoom();
}

function setControlsEnabled(ids, enabled){
  ids.forEach(id => {
    const el = document.querySelector('#' + id);
    if(el) el.disabled = !enabled;
  });
}

function setHatchControlsEnabled(){
  const textOn = document.querySelector('#showText').checked;
  const outlinesOn = document.querySelector('#showObjectOutlines').checked;
  const patchcoordsOn = document.querySelector('#showPatchcoords').checked;
  const curvyOn = patchcoordsOn && document.querySelector('#curvy').checked;
  const backgroundOn = document.querySelector('#enableBackgroundPattern').checked;
  const emptyHatchOn = document.querySelector('#emptyObjectHatch').checked;
  const bandHatchOn = document.querySelector('#bandHatch').checked;

  setControlsEnabled(['technicalPatchName','technicalAuthor','technicalDate'], document.querySelector('#showTechnicalLabel').checked);
  setControlsEnabled(['wrapText','forceCaps','hersheyFont','textSize','textWidth','textColor'], textOn);
  setControlsEnabled(['moduleColor','moduleWidth'], outlinesOn);
  setControlsEnabled(['cableColor','cableWidth','curvy','autoDashPatchcoords'], patchcoordsOn);
  setControlsEnabled(['curvature'], curvyOn);
  setControlsEnabled(['bgMode','bgColor','bgAmount'], backgroundOn);
  setControlsEnabled(['hatchColor','hatchWidth','hatchSpacing','hatchAngle','hatchCross'], emptyHatchOn);
  setControlsEnabled(['bandHatchColor','bandHatchWidth','bandHatchSpacing','bandHatchAngle','bandHatchCross'], bandHatchOn);
}

function clampControlNumber(value, control){
  let n = Number(value);
  if(!Number.isFinite(n)) n = Number(control.value) || 0;
  const min = control.min === '' ? -Infinity : Number(control.min);
  const max = control.max === '' ? Infinity : Number(control.max);
  return Math.min(max, Math.max(min, n));
}

function updateSpreadLabels(){
  const pairs = [['spreadX','spreadXValue'], ['spreadY','spreadYValue']];
  pairs.forEach(([sliderId, valueId]) => {
    const slider = document.querySelector('#' + sliderId);
    const value = document.querySelector('#' + valueId);
    if(slider && value && document.activeElement !== value) value.value = slider.value;
  });
}

function capturePreviewState(){
  const viewport = document.querySelector('#svg');
  return viewport ? { left: viewport.scrollLeft, top: viewport.scrollTop } : { left: 0, top: 0 };
}

function restorePreviewState(state, generation){
  const viewport = document.querySelector('#svg');
  if(!viewport || !state || generation !== previewRestoreGeneration) return;
  viewport.scrollLeft = state.left;
  viewport.scrollTop = state.top;
}

function redraw(){
  updateSpreadLabels();
  setHatchControlsEnabled();
  if(!patch) return;

  // Capture once for a whole burst of input/change events. This prevents the
  // second event from saving the temporary 0,0 position while the SVG is being rebuilt.
  if(!pendingPreviewState) pendingPreviewState = capturePreviewState();
  if(pendingRedrawFrame !== null) return;

  pendingRedrawFrame = requestAnimationFrame(() => {
    pendingRedrawFrame = null;
    const saved = pendingPreviewState || capturePreviewState();
    pendingPreviewState = null;
    const generation = ++previewRestoreGeneration;

    draw = drawSVG(patch);

    // Wait for SVG.js, transforms, spacer sizing and browser layout to settle.
    requestAnimationFrame(() => {
      restorePreviewState(saved, generation);
      requestAnimationFrame(() => restorePreviewState(saved, generation));
    });
  });
}

function initializeControlDefaults(){
  document.querySelectorAll('input, select').forEach(el => {
    if(el.id === 'fileInput') return;
    if(el.type === 'checkbox') el.dataset.defaultChecked = el.checked ? '1' : '0';
    else el.dataset.defaultValue = el.value;
  });
}

function restoreControlDefault(el){
  if(!el || el.disabled) return;

  if(el.id === 'spreadXValue' || el.id === 'spreadYValue'){
    const slider = document.querySelector(el.id === 'spreadXValue' ? '#spreadX' : '#spreadY');
    if(slider){
      slider.value = slider.dataset.defaultValue ?? slider.defaultValue;
      el.value = slider.value;
    }
    redraw();
    return;
  }

  if(el.type === 'checkbox') el.checked = el.dataset.defaultChecked === '1';
  else el.value = el.dataset.defaultValue ?? el.defaultValue;

  if(el.id === 'spreadX' || el.id === 'spreadY') updateSpreadLabels();
  if(el.id === 'previewZoom') applyPreviewZoom();
  else redraw();
}

function enableDoubleClickDefaults(){
  document.querySelectorAll('input, select').forEach(el => {
    if(el.id === 'fileInput') return;
    el.title = el.title ? `${el.title} · Double-click to reset` : 'Double-click to reset';
    el.addEventListener('dblclick', event => {
      event.preventDefault();
      event.stopPropagation();
      restoreControlDefault(el);
    });
  });
}

document.querySelector('#reset').addEventListener('click', resetControls);

document.querySelector('#read').addEventListener('click',()=>{
  const input=document.querySelector('#fileInput');
  if(input) input.click();
});
document.querySelector('#fileInput').addEventListener('change',()=>{
  const file=document.querySelector('#fileInput').files[0]; if(!file)return;
  const nameEl=document.querySelector('#fileName');
  if(nameEl) nameEl.textContent=file.name;
  currentPatchFileName=file.name.replace(/\.(maxpat|maxhelp|json)$/i,'');
  const technicalName=document.querySelector('#technicalPatchName');
  if(technicalName) technicalName.value=currentPatchFileName;
  const technicalDate=document.querySelector('#technicalDate');
  if(technicalDate) technicalDate.value=fileDateValue(file);
  const reader=new FileReader();
  reader.onloadend=()=>{
    try {
      const json=JSON.parse(reader.result);
      patch=json.patcher||json;
      draw=drawSVG(patch);
    } catch(error) {
      console.error(error);
      alert('Could not read this Max patch.');
    }
  };
  reader.readAsText(file);
});
['showTechnicalLabel','technicalPatchName','technicalAuthor','technicalDate','showObjectOutlines','showPatchcoords','enableBackgroundPattern','curvy','curvature','autoDashPatchcoords','bgMode','bgColor','bgAmount','showText','wrapText','forceCaps','hersheyFont','textSize','moduleColor','moduleWidth','emptyObjectHatch','hatchColor','hatchWidth','hatchSpacing','hatchAngle','hatchCross','bandHatch','bandHatchColor','bandHatchWidth','bandHatchSpacing','bandHatchAngle','bandHatchCross','cableColor','cableWidth','textColor','textWidth','spreadX','spreadY'].forEach(id=>{
  const el=document.querySelector('#'+id);
  if(!el) return;
  el.addEventListener('change',redraw);
  el.addEventListener('input',redraw);
});

[['spreadX','spreadXValue'], ['spreadY','spreadYValue']].forEach(([sliderId, valueId]) => {
  const slider = document.querySelector('#' + sliderId);
  const value = document.querySelector('#' + valueId);
  if(!slider || !value) return;

  value.addEventListener('input', () => {
    slider.value = clampControlNumber(value.value, slider);
    redraw();
  });
  value.addEventListener('change', () => {
    slider.value = clampControlNumber(value.value, slider);
    value.value = slider.value;
    redraw();
  });
});

const technicalDateInput=document.querySelector('#technicalDate');
if(technicalDateInput && !technicalDateInput.value){
  const now=new Date();
  technicalDateInput.value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}
initializeControlDefaults();
enableDoubleClickDefaults();
updateSpreadLabels();
document.querySelector('#previewZoom').addEventListener('input',applyPreviewZoom);

let pinchStartDistance = null;
let pinchStartZoom = null;
const viewport = document.querySelector('#svg');
function touchDistance(touches){
  const a=touches[0], b=touches[1];
  return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
}
viewport.addEventListener('touchstart', (e)=>{
  if(e.touches.length===2){
    pinchStartDistance = touchDistance(e.touches);
    pinchStartZoom = parseFloat(document.querySelector('#previewZoom').value)||100;
    e.preventDefault();
  }
}, {passive:false});
viewport.addEventListener('touchmove', (e)=>{
  if(e.touches.length===2 && pinchStartDistance){
    const ratio = touchDistance(e.touches)/pinchStartDistance;
    const el=document.querySelector('#previewZoom');
    el.value = Math.max(25, Math.min(300, pinchStartZoom*ratio));
    applyPreviewZoom();
    e.preventDefault();
  }
}, {passive:false});
viewport.addEventListener('touchend', ()=>{
  pinchStartDistance = null;
  pinchStartZoom = null;
});
viewport.addEventListener('wheel', (e)=>{
  if(!e.ctrlKey && !e.metaKey) return;
  const el=document.querySelector('#previewZoom');
  const delta = e.deltaY < 0 ? 10 : -10;
  el.value = Math.max(25, Math.min(300, parseFloat(el.value)+delta));
  applyPreviewZoom();
  e.preventDefault();
}, {passive:false});

setHatchControlsEnabled();
document.querySelectorAll('.section-enable').forEach(label=>{
  label.addEventListener('click', e=>e.stopPropagation());
  const input=label.querySelector('input');
  if(input) input.addEventListener('click', e=>e.stopPropagation());
});
document.querySelector('#export').addEventListener('click',()=>{
  if(!draw) return alert('Read a .maxpat first');
  const blob=new Blob([draw.svg()],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.download='patch2plotter.svg';
  a.href=URL.createObjectURL(blob);
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 0);
});
